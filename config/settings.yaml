paths:
  log_file: data/sample_auth.log
  events_output: outputs/events.json
  alerts_output: outputs/alerts.json
  summary_output: outputs/summary.json
  web_log_file: data/sample_web.log
  web_events_output: outputs/web_events.json
  web_alerts_output: outputs/web_alerts.json
  network_packets_replay: data/sample_packets.json
  network_events_output: outputs/network_events.json
  network_alerts_output: outputs/network_alerts.json

detection:
  brute_force:
    failed_attempt_threshold: 5
    time_window_seconds: 300
  web:
    suspicious_ip:
      request_threshold: 25
      time_window_seconds: 60
    traffic_spike:
      window_seconds: 120
      min_requests_in_window: 80
  network:
    port_scan:
      min_unique_destination_ports: 15
      time_window_seconds: 60
    repeated_connections:
      min_connection_attempts: 30
      time_window_seconds: 45
